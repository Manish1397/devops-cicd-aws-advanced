version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - echo Installing dependencies
      - python -m pip install --upgrade pip
      - pip install -r app/requirements.txt
      - pip install pytest
      - python -c "import flask; print('Flask installed successfully')"

  pre_build:
    commands:
      - echo Logging in to Amazon ECR
      - ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
      - REGION=us-east-1
      - REPOSITORY_URI=$ACCOUNT_ID.dkr.ecr.$REGION.amazonaws.com/devops-cicd-advanced
      - aws ecr get-login-password --region $REGION | docker login --username AWS --password-stdin $REPOSITORY_URI

  build:
    commands:
      - echo Running tests
      - pytest tests/
      - echo Building Docker image
      - docker build -t devops-cicd-advanced .
      - docker tag devops-cicd-advanced:latest $REPOSITORY_URI:latest

  post_build:
    commands:
      - |
        if [ "$CODEBUILD_BUILD_SUCCEEDING" = "1" ]; then
          echo Pushing Docker image
          docker push $REPOSITORY_URI:latest
          printf '[{"name":"myapp-container","imageUri":"%s"}]' $REPOSITORY_URI:latest > imagedefinitions.json
        else
          echo Build failed earlier, skipping push
          exit 1
        fi

artifacts:
  files:
    - imagedefinitions.json